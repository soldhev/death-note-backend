{% extends 'base.html' %}
{% block title %}Recuperar Senha — Death Note Store{% endblock %}
{% block container_class %}container-sm{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 70px); display:flex; align-items:center; justify-content:center;">
<div style="width:100%;">
  <div class="card">
    <h2 class="card-title">Recuperar Senha</h2>
    <p class="card-sub">Informe seu e-mail e enviaremos as instruções de recuperação.</p>

    <form method="POST">
      <div class="field">
        <label for="email">E-mail cadastrado</label>
        <input type="email" id="email" name="email" placeholder="light@kira.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Enviar instruções</button>
    </form>

    <div class="divider"></div>
    <div style="text-align:center; font-size:.83rem;">
      <a href="{{ url_for('auth.login') }}" style="color:#666;">← Voltar ao login</a>
    </div>
  </div>
</div>
</div>
{% endblock %}
